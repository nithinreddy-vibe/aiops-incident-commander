apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator-service
  labels:
    app: generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator
  template:
    metadata:
      labels:
        app: generator
    spec:
      containers:
        - name: generator
          image: aiops-incident-commander-generator:latest
          ports:
            - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: generator-service
spec:
  selector:
    app: generator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5001
