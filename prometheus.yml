global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "aiops-generator"
    static_configs:
      - targets: ["generator:5001"]
    metrics_path: "/metrics"

  - job_name: "aiops-engine"
    static_configs:
      - targets: ["aiops:5002"]
    metrics_path: "/metrics"
