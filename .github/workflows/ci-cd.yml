name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (Generator)
        run: |
          cd services/generator
          python -m pip install --upgrade pip
          pip install flake8 pytest -r requirements.txt

      - name: Lint Generator
        run: |
          cd services/generator
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Install dependencies (AIOps Engine)
        run: |
          cd services/aiops
          python -m pip install --upgrade pip
          pip install flake8 pytest -r requirements.txt

      - name: Lint AIOps Engine
        run: |
          cd services/aiops
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v3
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  docker-build:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v3

      - name: Build Dashboard
        run: docker build -t aiops-dashboard:latest ./services/dashboard

      - name: Build Generator
        run: docker build -t aiops-generator:latest ./services/generator

      - name: Build AIOps Engine
        run: docker build -t aiops-engine:latest ./services/aiops

  terraform-plan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        run: cd infrastructure/terraform && terraform init
      - name: Terraform Validate
        run: cd infrastructure/terraform && terraform validate
      - name: Terraform Plan
        run: cd infrastructure/terraform && terraform plan -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-west-2"
